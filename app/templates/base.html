<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Lector{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">▤</span> Lector
    </a>
    <nav class="topnav">
      <a href="/">Dokumente</a>
      <a href="/invoices">Rechnungen</a>
      <a href="/empfaenger">Empfänger</a>
    </nav>
    <span class="brand-sub">OCR-Veredelung für Paperless</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>

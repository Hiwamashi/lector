<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Lector{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">▤</span> Lector
    </a>
    <span class="brand-sub">OCR-Veredelung für Paperless</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
